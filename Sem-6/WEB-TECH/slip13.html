<html>
<head>
<script>

function showresponse(str){

    if(str.length == 0){
        document.getElementById("msg").innerHTML =
        "Stranger, please tell me your name!";
        return;
    }

    var x = new XMLHttpRequest();

    x.open("GET","slip13.php?q="+str,true);
    x.send();

    x.onreadystatechange = function(){
        if(x.readyState == 4 && x.status == 200){
            document.getElementById("msg").innerHTML = x.responseText;
        }
    };
}

</script>
</head>

<body>

<h3>Enter your name:</h3>

<input type="text" id="name" onkeyup="showresponse(this.value)">

<p id="msg"></p>

</body>
</html>
